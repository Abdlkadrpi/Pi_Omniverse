<!DOCTYPE html>
<html lang="ar">
<head>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
      const Pi = window.Pi;
      Pi.init({ version: "2.0" });
      async function authenticateUser() {
        try {
          const user = await Pi.authenticate(["username", "payments", "wallet_address"], (payment) => {});
          console.log("Welcome Commander: " + user.user.username);
        } catch (err) {
          console.error(err);
        }
      }
      window.onload = authenticateUser;
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛡️ Omniverse Hub | Web3 Core</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --gold: #ffd700; --dark: #0a0a0a; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .omni-card { border: 2px solid var(--gold); background: #111; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 0 30px rgba(255, 215, 0, 0.2); }
        .btn-connect { background: var(--gold); color: black; border: none; padding: 15px 35px; font-weight: bold; border-radius: 8px; cursor: pointer; margin: 10px; }
        #debug { font-size: 0.7rem; color: #888; margin-top: 15px; background: #000; padding: 10px; border-radius: 5px; width: 80%; }
    </style>
</head>
<body>
    <div id="dev-tools" style="position:fixed;top:0;left:0;z-index:9999;background:rgba(0,0,0,0.8);color:white;padding:10px;width:100%;text-align:center;"> <button onclick="window.location.href='https://sandbox.minepi.com/_sandbox/authorize'" style="background:#ffcc00;color:black;border:none;padding:10px 20px;border-radius:5px;font-weight:bold;cursor:pointer;">⚠️ اضغط هنا لتفعيل الرمز ⚠️</button> </div>
    <div class="omni-card">
        <h1>OMNIVERSE HUB</h1>
        <h2 id="user-display">IDENTITY: UNKNOWN</h2>
        <button class="btn-connect" onclick="login()">ESTABLISH LINK</button>
        <button style="background:transparent; color:#888; border:1px solid #444; padding:5px 10px; font-size:10px; cursor:pointer;" onclick="location.reload(true)">FORCE REFRESH</button>
        <div id="debug">System Booting...</div>
    </div>

    <script>
        const Pi = window.Pi;
        const debug = document.getElementById('debug');

        async function initPi() {
            try {
                // تفعيل الـ Sandbox بشكل صريح
                await Pi.init({ version: "2.0", sandbox: true });
                debug.innerText = "Protocol Ready. Click the button.";
            } catch (e) {
                debug.innerText = "Init Error: " + e.message;
            }
        }

        async function login() {
            debug.innerText = "Requesting Blockchain Auth...";
            try {
                const auth = await Pi.authenticate(['username', 'payments'], (payment) => {
                    console.log("Payment flow", payment);
                });
                document.getElementById('user-display').innerText = "CITIZEN: " + auth.user.username.toUpperCase();
                debug.innerText = "Access Granted! Connection Secure.";
            } catch (e) {
                debug.innerText = "Auth Failed: " + JSON.stringify(e);
                console.error(e);
            }
        }

        // تشغيل التهيئة فور تحميل الصفحة
        window.onload = initPi;
    </script>
</body>
</html>
