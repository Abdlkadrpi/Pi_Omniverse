<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omniverse Hub | Voice AI</title>
    <style>
        body { background: #080a0f; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        .logo { font-size: 2.5rem; font-weight: bold; color: #ffcc00; text-shadow: 0 0 30px rgba(255,204,0,0.6); margin-bottom: 5px; letter-spacing: 2px; }
        .ai-agent { width: 120px; height: 120px; background: radial-gradient(circle, #ffcc00, #ff8800); border-radius: 50%; margin: 0 auto 30px; box-shadow: 0 0 30px #ffcc00; animation: pulse 1.5s infinite ease-in-out; cursor: pointer; border: 4px solid rgba(255,255,255,0.2); }
        @keyframes pulse { 0% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.1); filter: brightness(1.3); } 100% { transform: scale(1); filter: brightness(1); } }
        .status-card { background: rgba(255,255,255,0.03); padding: 25px; border-radius: 25px; margin: 0 20px; border: 1px solid rgba(255,204,0,0.3); backdrop-filter: blur(10px); }
        .btn-action { background: linear-gradient(90deg, #ffcc00, #ff8800); color: #000; border: none; padding: 15px 35px; border-radius: 12px; font-weight: bold; margin-top: 20px; cursor: pointer; font-size: 1.1rem; box-shadow: 0 5px 15px rgba(255,204,0,0.3); }
    </style>
</head>
<body>
    <div class="ai-agent" onclick="activateAI()"></div>
    <div class="logo">OMNIVERSE HUB</div>
    <div class="status-card">
        <h2 id="greeting">مرحباً بك يا قائد عبد القادر</h2>
        <p id="ai-msg">أهلاً بك في قلب مدينتك الذكية. اضغط على الكرة الذهبية لتسمعني.</p>
        <p id="server-status" style="color: #ff4444; font-weight: bold;">● السيرفر المحلي: جاري البحث...</p>
        <button class="btn-action" onclick="copyCode()">📋 نسخ رمز التفعيل (Sandbox)</button>
    </div>

    <script>
        // دالة الصوت الذكي
        function activateAI() {
            const msg = new SpeechSynthesisUtterance();
            msg.text = "مرحباً بك يا قائد عبد القادر. أنظمة أومني فيرس تحت أمرك. أنا المساعد الذكي، جاري ربط البيانات وتحليل الشبكة الآن.";
            msg.lang = 'ar-SA';
            msg.rate = 0.9;
            window.speechSynthesis.cancel(); setTimeout(() => { window.speechSynthesis.speak(msg); }, 200);
            
            // تأثير بصري عند التحدث
            document.querySelector('.ai-agent').style.animationDuration = '0.5s';
            setTimeout(() => { document.querySelector('.ai-agent').style.animationDuration = '1.5s'; }, 5000);
        }

        function copyCode() {
            navigator.clipboard.writeText('LZ6QDDDK');
            alert("تم نسخ الرمز بنجاح! الصقه في خانة الـ Sandbox داخل تطبيق المطورين.");
        }

        // محاولة الربط الذكي
        async function checkServer() {
            const serverIP = "10.86.224.153";
            try {
                // استخدام Timeout لعدم تعليق المتصفح
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 2000);
                
                const res = await fetch(`http://${serverIP}:5000/`, { signal: controller.signal });
                const data = await res.json();
                
                document.getElementById('server-status').innerText = "● السيرفر المحلي: متصل بنجاح ✅";
                document.getElementById('server-status').style.color = "#00ff00";
                document.getElementById('ai-msg').innerText = "القائد متصل! جميع الأنظمة جاهزة لتنفيذ المهام.";
            } catch (e) {
                document.getElementById('server-status').innerText = "● السيرفر المحلي: غير متصل (تأكد من جدار الحماية)";
            }
        }
        setInterval(checkServer, 4000);
    }
    </script>
</body>
</html>
