<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omniverse Hub | Dashboard</title>
    <style>
        body { background: #080a0f; color: white; font-family: sans-serif; text-align: center; margin: 0; padding-top: 20px; }
        .logo { font-size: 2.2rem; font-weight: bold; color: #ffcc00; text-shadow: 0 0 20px #ffcc00; margin-bottom: 20px; }
        .ai-agent { width: 100px; height: 100px; background: radial-gradient(circle, #ffcc00, #ff8800); border-radius: 50%; margin: 0 auto 20px; box-shadow: 0 0 25px #ffcc00; animation: pulse 1.5s infinite; cursor: pointer; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .grid { display: flex; justify-content: center; gap: 10px; padding: 0 15px; margin-bottom: 20px; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,204,0,0.3); padding: 15px; border-radius: 15px; flex: 1; }
        .card-title { font-size: 0.7rem; color: #ffcc00; text-transform: uppercase; }
        .card-val { font-size: 1.1rem; font-weight: bold; margin-top: 5px; }
        .status-msg { color: #ff4444; font-weight: bold; margin: 15px 0; font-size: 0.9rem; }
        .btn-copy { background: #ffcc00; color: #000; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 80%; }
    </style>
</head>
<body>
    <div class="ai-agent" onclick="speak()"></div>
    <div class="logo">OMNIVERSE HUB</div>

    <div class="grid">
        <div class="card">
            <div class="card-title">Pi Node</div>
            <div id="node-status" class="card-val">Searching...</div>
        </div>
        <div class="card">
            <div class="card-title">AI Sync</div>
            <div class="card-val" style="color: #00ff00;">99.9%</div>
        </div>
    </div>

    <div class="status-msg" id="server-status">🔴 السيرفر المحلي: غير متصل</div>
    
    <button class="btn-copy" onclick="copyCode()">📋 نسخ رمز التفعيل</button>

    <script>
        function speak() {
            const msg = new SpeechSynthesisUtterance("مرحباً بك يا قائد عبد القادر في مركز قيادة أومني فيرس.");
            msg.lang = 'ar-SA';
            window.speechSynthesis.speak(msg);
        }
        function copyCode() {
            navigator.clipboard.writeText('LZ6QDDDK');
            alert("تم النسخ بنجاح!");
        }
        async function checkServer() {
            try {
                const res = await fetch('http://10.91.114.153:5000/', { mode: 'cors' });
                const data = await res.json();
                document.getElementById('server-status').innerText = "✅ السيرفر المحلي: متصل بنجاح";
                document.getElementById('server-status').style.color = "#00ff00";
                document.getElementById('node-status').innerText = "Synced";
                document.getElementById('node-status').style.color = "#00ff00";
            } catch (e) { }
        }
        setInterval(checkServer, 2000);
    </script>
<div style="margin-top:20px;"><a href="http://10.91.114.153:5000" target="_blank" style="color:#555; font-size:10px; text-decoration:none;">تأمين الاتصال المحلي</a></div>
</body>
</html>
